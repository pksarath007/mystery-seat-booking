
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seat Booking</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#f0f2f8;background-image:radial-gradient(ellipse at 20% 10%,rgba(47,120,196,.12) 0%,transparent 55%),radial-gradient(ellipse at 80% 80%,rgba(46,48,142,.10) 0%,transparent 55%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;color:#1a1a2e}
    .box{background:#fff;border-radius:24px;width:100%;max-width:380px;overflow:hidden;text-align:center;border:1px solid rgba(46,48,142,.12);box-shadow:0 20px 60px rgba(46,48,142,.12)}
    .stripe{height:5px;background:linear-gradient(135deg,#2E308E,#2F78C4)}
    .inner{padding:40px 28px 36px}
    .spinner{width:44px;height:44px;border-radius:50%;border:3px solid rgba(46,48,142,.15);border-top-color:#2E308E;animation:spin .8s linear infinite;margin:0 auto 24px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .title{font-family:'Bebas Neue',cursive;font-size:28px;letter-spacing:2px;margin-bottom:4px}
    .loc{font-family:'DM Mono',monospace;font-size:13px;font-weight:600;letter-spacing:1px;margin-bottom:12px;background:linear-gradient(135deg,#2E308E,#2F78C4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .msg{font-family:'DM Mono',monospace;font-size:11px;color:#8888aa;line-height:1.7}
    .pick{display:none;margin-top:20px;gap:12px;flex-direction:column}
    .pickBtn{padding:12px 20px;border:none;border-radius:12px;background:linear-gradient(135deg,#2E308E,#2F78C4);color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:1px}
    .pickBtn:hover{opacity:.9}
    .debug{margin-top:12px;font-family:'DM Mono',monospace;font-size:9px;color:#ccc;word-break:break-all}
  </style>
</head>
<body>
<div class="box">
  <div class="stripe"></div>
  <div class="inner">
    <div class="spinner" id="spinner"></div>
    <div class="title">Seat Booking</div>
    <div class="loc" id="locLabel"></div>
    <div class="msg" id="msg">Checking your access…</div>
    <div class="pick" id="pick">
      <button class="pickBtn" onclick="go('Neon')">🌟 Neon</button>
      <button class="pickBtn" onclick="go('MBP')">🏢 MBP</button>
    </div>
    <div class="debug" id="debug"></div>
  </div>
</div>

<script>
  const TOKEN_SECRET = 'msb2026'

  function getToken(loc) {
    const now  = new Date()
    const y    = now.getFullYear()
    const m    = String(now.getMonth() + 1).padStart(2, '0')
    const d    = String(now.getDate()).padStart(2, '0')
    const slot = now.getHours() < 14 ? 'AM' : 'PM'
    return TOKEN_SECRET + '-' + y + m + d + '-' + slot + '-' + loc
  }

  function go(loc) {
    var token = getToken(loc)

    // Build the app URL — same origin, same path prefix, just index.html
    // e.g. https://pksarath007.github.io/mystery-seat-booking/go.html
    //   → https://pksarath007.github.io/mystery-seat-booking/index.html?t=...
    var currentPath = window.location.pathname  // /mystery-seat-booking/go.html
    var basePath    = currentPath.replace('go.html', '')  // /mystery-seat-booking/
    var dest        = window.location.origin + basePath + 'index.html?t=' + encodeURIComponent(token)

    document.getElementById('debug').textContent = '→ ' + dest
    document.getElementById('msg').textContent = 'Redirecting to ' + loc + '…'
    document.getElementById('spinner').style.display = 'block'

    setTimeout(function() {
      window.location.replace(dest)
    }, 300)
  }

  // Read ?loc= param
  var params = new URLSearchParams(window.location.search)
  var loc    = params.get('loc')

  if (loc && (loc === 'Neon' || loc === 'MBP')) {
    document.getElementById('locLabel').textContent = (loc === 'Neon' ? '🌟 ' : '🏢 ') + loc
    document.getElementById('msg').textContent = 'Access confirmed — loading…'
    go(loc)
  } else {
    // No loc param — show manual picker
    document.getElementById('spinner').style.display = 'none'
    document.getElementById('msg').textContent = 'Select your venue:'
    document.getElementById('pick').style.display = 'flex'
  }
</script>
</body>
</html>
